<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Out of Sorts</title>
    <meta
      name="description"
      content="Make a word from eight letters. Every letter you don't use is gone forever. Keep going until you can't. A daily word game about loss."
    />
    <meta name="theme-color" content="#F4F2FB" />

    <!-- Favicons. The SVG first for browsers that take it; the ico carries
         16 and 32 for those that do not, because a 192 downscaled to 16 is
         mush. The 192 and 512 live in the manifest and nowhere else. -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.ico" sizes="16x16 32x32" />
    <link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32" />
    <link rel="icon" href="/favicon-16.png" type="image/png" sizes="16x16" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Open graph. Absolute URLs, or no scraper resolves the image, which
         is why the link preview showed nothing anywhere. Both the url and
         the image come from one build time origin (%SITE_ORIGIN%), so they
         cannot drift apart or rot again. -->
    <meta property="og:title" content="Out of Sorts" />
    <meta
      property="og:description"
      content="Make a word from eight letters. Every letter you don't use is gone forever. Keep going until you can't. A daily word game about loss."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="%SITE_ORIGIN%/" />
    <meta property="og:image" content="%SITE_ORIGIN%/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Out of Sorts: ghosts drifting up from a rack of eight letter tiles, above a descending stack of played words."
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="%SITE_ORIGIN%/og.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
