<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- The ghost. Silhouette and eyes, nothing else: it must read at 16px,
       so it nearly fills the frame (a hair of margin, not a third of one).
       On a dark tab the violet body is lifted so it does not sink into
       the chrome. -->
  <style>
    .body { fill: #7F77DD; }
    .eye { fill: #F4F2FB; }
    @media (prefers-color-scheme: dark) {
      .body { fill: #A29BF0; }
      .eye { fill: #1B1738; }
    }
  </style>
  <path class="body" d="M50 2C22.4 2 3 22.6 3 50v43.5c0 3.9 4.7 6 7.8 3.4l7.4-6.2c2-1.7 5-1.7 7 0l8.8 7.4c2 1.7 5 1.7 7 0l7.2-6.1c2-1.7 5-1.7 7 0l7.2 6.1c2 1.7 5 1.7 7 0l8.8-7.4c2-1.7 5-1.7 7 0l7.4 6.2c3.1 2.6 7.8.5 7.8-3.4V50C97 22.6 77.6 2 50 2z"/>
  <circle class="eye" cx="34" cy="45" r="9"/>
  <circle class="eye" cx="66" cy="45" r="9"/>
</svg>
